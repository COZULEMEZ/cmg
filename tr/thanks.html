<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Başvuru Alındı | CMG</title>
    <meta name="robots" content="noindex, follow" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="stylesheet" href="/style.css">
    <style>
        .thanks-content {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        .thanks-card {
            max-width: 600px;
            padding: 60px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 28px;
            backdrop-filter: blur(20px);
        }
        .check-icon {
            width: 80px;
            height: 80px;
            background: var(--accent-blue);
            color: #fff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            margin: 0 auto 32px;
            box-shadow: 0 0 30px rgba(51, 153, 255, 0.3);
        }
        h1 {
            font-size: 40px;
            font-weight: 800;
            margin-bottom: 16px;
            letter-spacing: -0.04em;
            color: #fff;
        }
        p {
            font-size: 19px;
            color: rgba(255,255,255,0.6);
            margin-bottom: 40px;
            line-height: 1.5;
        }
        .btn-back {
            display: inline-block;
            padding: 18px 36px;
            background: #fff;
            color: #000;
            border-radius: 40px;
            text-decoration: none;
            font-size: 16px;
            font-weight: 700;
            transition: all 0.3s ease;
        }
        .btn-back:hover {
            transform: scale(1.05);
            background: var(--accent-blue);
            color: #fff;
        }
    </style>
    <meta http-equiv="refresh" content="6;url=/tr/">
</head>
<body>
    <div class="page-loader" id="pageLoader"></div>
    <div class="cursor-glow-container" id="cursorGlow"><div class="cursor-glow-inner"></div></div>
    <div class="cursor-stealth" id="cursorStealth"></div>

    <main class="thanks-content">
        <div class="thanks-card fade-in-up">
            <div class="check-icon">✓</div>
            <h1>Veri İletimi Başarılı.</h1>
            <p>Profiliniz şifrelenmiş bir şekilde A&R departmanımıza iletildi. Vizyonumuza uygun projelerle en kısa sürede iletişime geçilecektir.</p>
            <a href="/tr/" class="btn-back">Merkez Üssüne Dön</a>
            <p style="font-size: 13px; margin-top: 32px; opacity: 0.3;">6 saniye içinde yönlendiriliyorsunuz...</p>
        </div>
    </main>

    <script type="module" src="/main.js"></script>
</body>
</html>
