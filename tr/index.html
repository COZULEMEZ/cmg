<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>CMG · Elit Müzik Zekası</title>
  <meta name="description" content="ISRC, UPC, URL veya arama ile her eseri, albümü ve sanatçıyı 37 streaming platformunda sorgula.">
  <link rel="stylesheet" href="../style.css">
</head>
<body>

<div id="pageLoader"></div>

<header>
  <div class="wrap">
    <nav class="nav-inner">
      <a class="wordmark" href="/tr/">CMG<em>.</em></a>
      <div class="nav-pill">
        <a href="/">English</a>
      </div>
    </nav>
  </div>
</header>

<main>
  <div class="wrap">

    <section class="hero fade-in">
      <div class="hero-kicker">
        <span class="hero-kicker-dot"></span>
        37 Servis Aktif
      </div>
      <h1 class="hero-title">Müzik<br>Zekası</h1>
      <p class="hero-sub">ISRC, UPC, streaming URL veya anahtar kelimeyle her eseri, albümü veya sanatçıyı sorgula — anında tüm linkler.</p>

      <div class="search-card" id="searchCard">
        <div class="seg">
          <button class="seg-btn active" data-type="isrc">ISRC</button>
          <button class="seg-btn" data-type="upc">UPC</button>
          <button class="seg-btn" data-type="url">URL</button>
          <button class="seg-btn" data-type="search">ARA</button>
        </div>
        <div class="input-row">
          <div class="input-wrap">
            <input
              class="query-input"
              id="query"
              type="text"
              placeholder="ISRC — örn: USUG11901472"
              autocomplete="off"
              spellcheck="false"
              autocorrect="off"
            >
          </div>
          <button class="search-btn" id="searchBtn">
            <span class="btn-label">Ara</span>
            <span class="btn-spinner" style="display:none;"></span>
          </button>
        </div>
      </div>

      <div class="error-box" id="errorBox" style="display:none;"></div>
    </section>

    <div class="results-card fade-in" id="resultsCard">
      <div class="art-banner">
        <div id="artImg">
          <div class="art-no-img">♪</div>
        </div>
        <div class="art-badges">
          <div class="badge-explicit" id="explicitBadge" style="display:none;">EKSPLİSİT</div>
          <div class="badge-album" id="albumTag" style="display:none;"></div>
        </div>
      </div>

      <div class="result-body">
        <div class="track-title" id="trackTitle">—</div>
        <div class="track-artist" id="trackArtist">—</div>

        <div class="preview-wrap" id="previewWrap">
          <button class="play-btn" id="playBtn" aria-label="Oynat">
            <span class="play-icon-tri"></span>
          </button>
          <audio id="audioEl"></audio>
          <span class="preview-label">30 SN ÖNİZLEME</span>
        </div>

        <div class="meta-list" id="metaList"></div>
      </div>

      <div class="dsp-section">
        <div class="dsp-header">
          <span class="dsp-title">Yayında</span>
          <div class="dsp-divider"></div>
        </div>
        <div class="dsp-grid" id="linksGrid"></div>
      </div>
    </div>

    <div class="search-results fade-in" id="searchResults">
      <div class="sr-header">
        <span class="sr-header-label">Arama Sonuçları</span>
        <div class="dsp-divider"></div>
      </div>
      <div class="sr-list" id="searchList"></div>
    </div>

  </div>
</main>

<footer>
  <div class="wrap">
    <div class="footer-inner">
      <span>© 2026 CMG Intelligence. Elitler için inşa edildi.</span>
      <div class="footer-links">
        <a href="#">Güvenlik</a>
        <a href="#">Lab v4.0</a>
      </div>
    </div>
  </div>
</footer>

<script src="../main.js"></script>
</body>
</html>
