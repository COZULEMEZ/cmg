<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  
  <!-- Primary Meta Tags -->
  <title>CMG Elite · Music Intelligence & Metadata Lookup (ISRC, UPC)</title>
  <meta name="title" content="CMG Elite · Music Intelligence & Metadata Lookup (ISRC, UPC)">
  <meta name="description" content="The premier music intelligence platform by Cozulemez Music Group. Look up any track, album or artist by ISRC, UPC, or URL across 40+ streaming services instantly.">
  <meta name="keywords" content="ISRC lookup, UPC code search, music metadata finder, music intelligence engine, streaming link converter, global music database, Cozulemez Music Group, music analytics">
  <meta name="author" content="Cozulemez Music Group">
  <meta name="robots" content="index, follow">
  
  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://cozulemezmusicgroup.com.tr/">
  <meta property="og:title" content="CMG Elite · Global Music Intelligence">
  <meta property="og:description" content="Instant music metadata lookup for ISRC, UPC, and streaming links. Powered by Cozulemez Music Group.">
  
  <!-- Twitter -->
  <meta property="twitter:card" content="summary_large_image">
  <meta property="twitter:url" content="https://cozulemezmusicgroup.com.tr/">
  <meta property="twitter:title" content="CMG Elite · Global Music Intelligence">
  <meta property="twitter:description" content="Instant music metadata lookup for ISRC, UPC, and streaming links. Powered by Cozulemez Music Group.">

  <!-- Canonical -->
  <link rel="canonical" href="https://cozulemezmusicgroup.com.tr/">

  <!-- Structured Data (JSON-LD) -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebApplication",
    "name": "CMG Elite Intelligence",
    "url": "https://cozulemezmusicgroup.com.tr",
    "description": "Global music metadata lookup platform for ISRC and UPC codes.",
    "applicationCategory": "MultimediaApplication",
    "operatingSystem": "All",
    "author": {
      "@type": "Organization",
      "name": "Cozulemez Music Group"
    },
    "offers": {
      "@type": "Offer",
      "price": "0",
      "priceCurrency": "USD"
    }
  }
  </script>

  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="pageLoader"></div>

<!-- Background iOS Bubbles -->
<div class="bg-bubble bg-pink"></div>
<div class="bg-bubble bg-blue"></div>
<div class="bg-bubble bg-purple"></div>

<!-- ── NAV ── -->
<header>
  <div class="wrap">
    <nav class="nav-inner">
      <a class="wordmark" href="/">CMG<em>.</em></a>
    </nav>
  </div>
</header>

<main>
  <div class="wrap">

    <!-- ── HERO ── -->
    <section class="hero stagger-in">
      <div class="hero-kicker">
        <span class="hero-kicker-dot"></span>
        40 Services Live
      </div>
      <h1 class="hero-title">Music<br>Intelligence</h1>
      <p class="hero-sub">Look up any track, album or artist by ISRC, UPC, streaming URL, or keyword — and get every link, instantly.</p>

      <!-- Search Card -->
      <div class="search-card" id="searchCard">
        <!-- Segmented Control -->
        <div class="seg">
          <div class="seg-pill" id="segPill"></div>
          <button class="seg-btn active" data-type="isrc">ISRC</button>
          <button class="seg-btn" data-type="upc">UPC</button>
          <button class="seg-btn" data-type="url">URL</button>
          <button class="seg-btn" data-type="search">SEARCH</button>
        </div>
        <!-- Input -->
        <div class="input-row">
          <div class="input-wrap">
            <input
              class="query-input"
              id="query"
              type="text"
              placeholder="ISRC — e.g. USUG11901472"
              autocomplete="off"
              spellcheck="false"
              autocorrect="off"
            >
          </div>
          <button class="search-btn" id="searchBtn">
            <span class="btn-label">Search</span>
            <span class="btn-spinner" style="display:none;"></span>
          </button>
        </div>
      </div>

      <!-- Error -->
      <div class="error-box" id="errorBox" style="display:none;"></div>
    </section>

    <!-- ── SINGLE RESULT CARD ── -->
    <div class="results-card fade-in" id="resultsCard">

      <!-- Cover art banner -->
      <div class="art-banner">
        <div id="artImg">
          <div class="art-no-img">♪</div>
        </div>
        <div class="art-badges">
          <div class="badge-explicit" id="explicitBadge" style="display:none;">EXPLICIT</div>
          <div class="badge-album" id="albumTag" style="display:none;"></div>
        </div>
      </div>

      <!-- Track info -->
      <div class="result-body">
        <div class="track-title" id="trackTitle">—</div>
        <div class="track-artist" id="trackArtist">—</div>

        <!-- Audio preview -->
        <div class="preview-wrap" id="previewWrap">
          <button class="play-btn" id="playBtn" aria-label="Play">
            <span class="play-icon-tri"></span>
          </button>
          <audio id="audioEl"></audio>
          <span class="preview-label">30 SEC PREVIEW</span>
        </div>

        <!-- Metadata list -->
        <div class="meta-list" id="metaList"></div>
      </div>

      <!-- Streaming links -->
      <div class="dsp-section">
        <div class="dsp-header">
          <span class="dsp-title">Available On</span>
          <div class="dsp-divider"></div>
        </div>
        <div class="dsp-grid" id="linksGrid"></div>
      </div>

    </div>

    <!-- ── SEARCH RESULTS ── -->
    <div class="search-results fade-in" id="searchResults">
      <div class="sr-header">
        <span class="sr-header-label">Search Results</span>
        <div class="dsp-divider"></div>
      </div>
      <div class="sr-list" id="searchList"></div>
    </div>

  </div><!-- /wrap -->
</main>

<footer>
  <div class="wrap">
    <div class="footer-inner">
      <span>© 2026 CMG Intelligence. Built for the elite.</span>
      <div class="footer-links">
        <a href="#">Security</a>
        <a href="#">Lab v4.0</a>
      </div>
    </div>
  </div>
</footer>

<script src="main.js"></script>
</body>
</html>
